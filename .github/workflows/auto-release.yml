name: Auto-Release on Version Bump

# Triggers whenever package.json changes on main/master.
# Compares the version field against existing GitHub releases and creates one
# if it doesn't exist yet — which in turn fires publish.yml (npm + headlessmode post).

on:
  push:
    branches: [main, master]
    paths: ['package.json']

jobs:
  auto-release:
    name: Create GitHub release if version is new
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.pkg.outputs.version }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build changelog from git log
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --oneline "${PREV_TAG}..HEAD" --no-merges)
          else
            LOG=$(git log --oneline --no-merges | head -20)
          fi
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "rigscore v${{ steps.pkg.outputs.version }}" \
            --notes "${{ steps.changelog.outputs.log }}"
          echo "Created release v${{ steps.pkg.outputs.version }}"
