name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm test
      - run: npm publish --access public --provenance

  release-post:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate release post for headlessmode.com
        env:
          GH_TOKEN: ${{ secrets.HEADLESSMODE_PAT }}
        run: |
          set -euo pipefail

          # Extract release metadata
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          BODY=$(printf '%s' "${{ github.event.release.body }}" | head -c 500)

          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 "v${VERSION}^" 2>/dev/null || echo "v0.0.0")
          PREV_VERSION="${PREV_TAG#v}"

          # Get git log between tags
          GIT_LOG=$(git log --oneline "${PREV_TAG}..v${VERSION}" --no-merges 2>/dev/null || echo "")

          echo "Version: ${VERSION}"
          echo "Previous: ${PREV_VERSION}"
          echo "Commits: $(echo "${GIT_LOG}" | wc -l)"

          # Clone headlessmode repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/Back-Road-Creative/headlessmode.git" /tmp/headlessmode
          cd /tmp/headlessmode

          # Generate the journal post
          node scripts/generate-rigscore-post.js \
            --version "${VERSION}" \
            --prev-version "${PREV_VERSION}" \
            --release-body "${BODY}" \
            --git-log "${GIT_LOG}"

          # Patch the tool page version string and date
          node scripts/patch-rigscore-toolpage.js --version "${VERSION}"

          # Create branch and PR
          BRANCH="rigscore-release/v${VERSION}"
          git config user.name "rigscore-bot"
          git config user.email "rigscore-bot@headlessmode.com"
          git checkout -b "${BRANCH}"
          git add content/journal/ content/tools/rigscore.md
          git commit -m "release: rigscore v${VERSION} — journal post + tool page sync"
          git push origin "${BRANCH}"

          gh pr create \
            --repo Back-Road-Creative/headlessmode \
            --title "journal: rigscore v${VERSION}" \
            --body "Auto-generated release post for rigscore v${VERSION}. Created by rigscore publish workflow." \
            --head "${BRANCH}" \
            --base master
