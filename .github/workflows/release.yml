name: Release

# Triggered by a package.json version bump on main.
# Single workflow — no cross-workflow event chain, no GITHUB_TOKEN trigger gap.
#
# Steps: test → GitHub release → headlessmode post PR
# Distribution: GitHub only (npx github:Back-Road-Creative/rigscore)

on:
  push:
    branches: [main, master]
    paths: ['package.json']
  workflow_dispatch:   # allows manual re-trigger after tag/release cleanup

jobs:
  release:
    name: Test and release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if already released (idempotent)
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.pkg.outputs.version }}" \
               --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.pkg.outputs.version }} already released — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Run tests
        if: steps.check.outputs.exists == 'false'
        run: npm test

      - name: Build changelog
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --oneline "${PREV_TAG}..HEAD" --no-merges)
          else
            LOG=$(git log --oneline --no-merges | head -20)
          fi
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
            echo "prev_tag=${PREV_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "rigscore v${{ steps.pkg.outputs.version }}" \
            --notes "${{ steps.changelog.outputs.log }}"
          echo "Created release v${{ steps.pkg.outputs.version }}"

      - name: Generate headlessmode release post + tool page sync
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.HEADLESSMODE_PAT }}
          RIGSCORE_CHANGELOG: ${{ steps.changelog.outputs.log }}
          RIGSCORE_PREV_TAG: ${{ steps.changelog.outputs.prev_tag }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.pkg.outputs.version }}"
          PREV_VERSION="${RIGSCORE_PREV_TAG#v}"

          echo "Version: ${VERSION}"
          echo "Previous: ${PREV_VERSION:-none}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/Back-Road-Creative/headlessmode.git" /tmp/headlessmode
          cd /tmp/headlessmode

          # Write git log to temp file — avoids multiline shell argument issues
          printf '%s\n' "${RIGSCORE_CHANGELOG}" > /tmp/rigscore-git-log.txt

          # Generate journal post — exits non-zero if no conventional commits found
          node scripts/generate-rigscore-post.js \
            --version "${VERSION}" \
            --prev-version "${PREV_VERSION}" \
            --git-log-file "/tmp/rigscore-git-log.txt"

          # Patch tool page version string and date
          node scripts/patch-rigscore-toolpage.js --version "${VERSION}"

          BRANCH="rigscore-release/v${VERSION}"
          git config user.name "rigscore-bot"
          git config user.email "rigscore-bot@headlessmode.com"
          git checkout -b "${BRANCH}"
          git add content/journal/ content/tools/rigscore.md
          git commit -m "release: rigscore v${VERSION} — journal post + tool page sync"
          git push origin "${BRANCH}"

          gh pr create \
            --repo Back-Road-Creative/headlessmode \
            --title "release: rigscore v${VERSION}" \
            --body "Auto-generated release post for rigscore v${VERSION}. Includes journal post and tool page version bump. Created by rigscore release workflow." \
            --head "${BRANCH}" \
            --base master
